name: Manual site update

on:
  workflow_dispatch:
    inputs:
      database_run_id:
        description: "Optional database refresh run ID. Leave empty to use the latest successful database refresh."
        required: false
        default: ""

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download database artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DATABASE_RUN_ID: ${{ inputs.database_run_id }}
        run: |
          if [ -z "$DATABASE_RUN_ID" ]; then
            DATABASE_RUN_ID="$(gh run list --workflow manual-refresh.yml --status success --limit 1 --json databaseId --jq '.[0].databaseId')"
          fi

          if [ -z "$DATABASE_RUN_ID" ]; then
            echo "No successful database refresh run found."
            exit 1
          fi

          gh run download "$DATABASE_RUN_ID" --name mfl_progression_database --dir .

      - name: Export website data
        run: python export_for_website.py

      - name: Set up GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload website
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Publish website
        uses: actions/deploy-pages@v4
