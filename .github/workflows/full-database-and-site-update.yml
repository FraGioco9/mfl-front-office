name: Full database and site update

on:
  schedule:
    # GitHub cron is UTC. Separate CET/CEST candidates are gated against the intended Rome clock time.
    - cron: "20 8 * * *"
    - cron: "20 9 * * *"
    - cron: "15 17 * * *"
    - cron: "15 18 * * *"
    - cron: "15 21 * * *"
    - cron: "15 22 * * *"
  workflow_dispatch:
    inputs:
      max_player_id:
        description: "Optional maximum player ID override for a test run."
        required: false
        default: ""
      ownership_mode:
        description: "Use the stored ownership checkpoint, or replay all Flow deposit events."
        required: true
        type: choice
        options:
          - "incremental"
          - "full"
        default: "incremental"
      ownership_start_height:
        description: "Optional first Flow block for ownership replay."
        required: false
        default: ""

permissions:
  contents: read
  actions: read

concurrency:
  group: database-and-vercel-site
  cancel-in-progress: false

jobs:
  refresh-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Check Rome schedule time
        id: schedule_gate
        if: github.event_name == 'schedule'
        shell: bash
        env:
          SCHEDULE_CRON: ${{ github.event.schedule }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo

          cron = os.environ.get("SCHEDULE_CRON", "")
          parts = cron.split()
          should_run = False
          if len(parts) >= 2:
              minute = int(parts[0])
              hour = int(parts[1])
              now_utc = datetime.now(timezone.utc)
              scheduled_utc = now_utc.replace(hour=hour, minute=minute, second=0, microsecond=0)
              scheduled_rome = scheduled_utc.astimezone(ZoneInfo("Europe/Rome"))
              should_run = (scheduled_rome.hour, scheduled_rome.minute) in {(10, 20), (19, 15), (23, 15)}
          print(f"should_run={'true' if should_run else 'false'}")
          PY

      - name: Set up Python
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore previous database artifact
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p previous-database
          {
            gh run list --workflow flow-rebuild-candidate.yml --status success --limit 30 --json databaseId,createdAt --jq '.[] | [.createdAt, .databaseId] | @tsv' || true
            gh run list --workflow players-database-refresh.yml --status success --limit 30 --json databaseId,createdAt --jq '.[] | [.createdAt, .databaseId] | @tsv' || true
            gh run list --workflow full-database-refresh.yml --status success --limit 30 --json databaseId,createdAt --jq '.[] | [.createdAt, .databaseId] | @tsv' || true
            gh run list --workflow full-database-and-site-update.yml --status success --limit 30 --json databaseId,createdAt --jq '.[] | [.createdAt, .databaseId] | @tsv' || true
            gh run list --workflow seasons-database-refresh.yml --status success --limit 30 --json databaseId,createdAt --jq '.[] | [.createdAt, .databaseId] | @tsv' || true
          } | sort -r | while IFS=$'\t' read -r CREATED_AT RUN_ID; do
            [ -n "$RUN_ID" ] || continue
            HAS_DATABASE_ARTIFACT="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts" --jq '.artifacts[] | select(.name == "mfl_progression_database" and .expired == false) | .name' | head -n 1)"
            if [ -n "$HAS_DATABASE_ARTIFACT" ]; then
              echo "$RUN_ID" > previous_database_run_id.txt
              break
            fi
          done

          if [ ! -f previous_database_run_id.txt ]; then
            echo "No previous database artifact found. The Flow rebuild must preserve unavailable columns." >&2
            exit 1
          fi
          DATABASE_RUN_ID="$(cat previous_database_run_id.txt)"
          gh run download "$DATABASE_RUN_ID" --name mfl_progression_database --dir previous-database
          cp previous-database/*.db mfl_progression.db

      - name: Test rebuild code
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - name: Run Flow database rebuild
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        shell: bash
        run: |
          OWNERSHIP_MODE="${{ inputs.ownership_mode || 'incremental' }}"
          COMMAND=(python run_flow_rebuild.py --ownership-mode "$OWNERSHIP_MODE")
          if [ -n "${{ inputs.max_player_id }}" ]; then
            COMMAND+=(--max-player-id "${{ inputs.max_player_id }}")
          fi
          if [ -n "${{ inputs.ownership_start_height }}" ]; then
            COMMAND+=(--ownership-start-height "${{ inputs.ownership_start_height }}")
          fi
          "${COMMAND[@]}"

      - name: Send progression emails
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_REPLY_TO: ${{ secrets.EMAIL_REPLY_TO }}
          EMAIL_BASE_URL: https://mfl-front-office.vercel.app
        run: python send_progression_emails.py --previous-db previous-database/mfl_progression.db --current-db mfl_progression.db

      - name: Export website data
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        run: python export_for_website.py

      - name: Upload database
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mfl_progression_database
          path: mfl_progression.db
          if-no-files-found: error

      - name: Upload validation report
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: flow_rebuild_validation
          path: flow_rebuild_validation.json
          if-no-files-found: error

      - name: Move data behind protected API
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        shell: bash
        run: |
          rm -rf site/api/data-files
          mkdir -p site/api/data-files
          mv site/data/*.json site/api/data-files/
          rmdir site/data
          test -f site/api/data-files/manifest.json
          ls site/api/data-files | head

      - name: Install Vercel CLI
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        run: npm install --global vercel@latest

      - name: Connect Vercel project
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        shell: bash
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > .vercel/project.json

      - name: Deploy protected site to Vercel
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prod --yes --build-env ALLOW_VERCEL_ACTION_DEPLOY=1 --token "$VERCEL_TOKEN"
