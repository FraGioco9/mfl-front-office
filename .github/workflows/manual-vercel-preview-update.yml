name: Manual Vercel preview update

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: vercel-preview-site
  cancel-in-progress: true

jobs:
  publish-preview:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download latest database artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATABASE_RUN_ID=""

          {
            gh run list --workflow manual-refresh.yml --status success --limit 30 --json databaseId,createdAt --jq '.[] | [.createdAt, .databaseId] | @tsv'
            gh run list --workflow manual-database-and-site.yml --status success --limit 30 --json databaseId,createdAt --jq '.[] | [.createdAt, .databaseId] | @tsv'
          } | sort -r | while IFS=$'\t' read -r CREATED_AT RUN_ID; do
            if [ -z "$RUN_ID" ]; then
              continue
            fi

            HAS_DATABASE_ARTIFACT="$(
              gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts" \
                --jq '.artifacts[] | select(.name == "mfl_progression_database" and .expired == false) | .name' \
                | head -n 1
            )"

            if [ -n "$HAS_DATABASE_ARTIFACT" ]; then
              echo "$RUN_ID" > database_run_id.txt
              break
            fi

            echo "Skipping run $RUN_ID from $CREATED_AT because it has no usable database artifact."
          done

          if [ ! -f database_run_id.txt ]; then
            echo "No successful database refresh run with a usable database artifact found."
            exit 1
          fi

          DATABASE_RUN_ID="$(cat database_run_id.txt)"
          echo "Using database artifact from run $DATABASE_RUN_ID"
          gh run download "$DATABASE_RUN_ID" --name mfl_progression_database --dir .

      - name: Export website data
        run: python export_for_website.py

      - name: Move data behind protected API
        shell: bash
        run: |
          rm -rf site/api/data-files
          mkdir -p site/api/data-files
          mv site/data/*.json site/api/data-files/
          rmdir site/data
          test -f site/api/data-files/manifest.json
          ls site/api/data-files | head

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Connect Vercel project
        shell: bash
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > .vercel/project.json

      - name: Deploy preview site to Vercel
        id: deploy_preview
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          vercel deploy --yes --build-env ALLOW_VERCEL_ACTION_DEPLOY=1 --token "$VERCEL_TOKEN" | tee vercel-preview-output.txt
          PREVIEW_URL="$(tail -n 1 vercel-preview-output.txt)"
          echo "preview_url=$PREVIEW_URL" >> "$GITHUB_OUTPUT"
          echo "### Vercel Preview" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Preview URL: $PREVIEW_URL" >> "$GITHUB_STEP_SUMMARY"