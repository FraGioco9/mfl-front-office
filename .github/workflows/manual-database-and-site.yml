name: Manual database and site update

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Number of leaderboard wallets to refresh. Leave empty for all wallets."
        required: false
        default: ""
      wallet:
        description: "Single wallet address to refresh. Leave empty to use leaderboard wallets."
        required: false
        default: ""
      workers:
        description: "Number of workers to use."
        required: false
        default: "100"
      seasons:
        description: "Also populate player_seasons from Flow after the main refresh."
        required: true
        type: choice
        options:
          - "no"
          - "yes"
        default: "no"

permissions:
  contents: read

concurrency:
  group: database-and-vercel-site
  cancel-in-progress: false

jobs:
  refresh-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run database refresh
        shell: bash
        run: |
          COMMAND=(python update_database.py --workers "${{ inputs.workers }}" --seasons "${{ inputs.seasons }}")

          if [ -n "${{ inputs.limit }}" ]; then
            COMMAND+=(--limit "${{ inputs.limit }}")
          fi

          if [ -n "${{ inputs.wallet }}" ]; then
            COMMAND+=(--wallet "${{ inputs.wallet }}")
          fi

          "${COMMAND[@]}"

      - name: Export website data
        run: python export_for_website.py

      - name: Upload database
        uses: actions/upload-artifact@v4
        with:
          name: mfl_progression_database
          path: mfl_progression.db
          if-no-files-found: error

      - name: Move data behind protected API
        shell: bash
        run: |
          rm -rf site/api/data-files
          mkdir -p site/api/data-files
          mv site/data/*.json site/api/data-files/
          rmdir site/data
          test -f site/api/data-files/manifest.json
          ls site/api/data-files | head

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Connect Vercel project
        shell: bash
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > .vercel/project.json

      - name: Deploy protected site to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prod --yes --token "$VERCEL_TOKEN"
