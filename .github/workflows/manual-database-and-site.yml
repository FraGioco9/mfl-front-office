name: Manual database and site update

on:
  schedule:
    # GitHub cron is UTC. Separate CET/CEST candidates are gated against the intended Rome clock time.
    - cron: "20 8 * * *"
    - cron: "20 9 * * *"
    - cron: "15 17 * * *"
    - cron: "15 18 * * *"
    - cron: "15 21 * * *"
    - cron: "15 22 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Number of leaderboard wallets to refresh. Leave empty for all wallets."
        required: false
        default: ""
      wallet:
        description: "Single wallet address to refresh. Leave empty to use leaderboard wallets."
        required: false
        default: ""
      mfl_wallet:
        description: "Refresh the large MFL wallet too. Leave false to preserve current MFL rows."
        required: true
        type: choice
        options:
          - "false"
          - "true"
        default: "false"

permissions:
  contents: read
  actions: read

concurrency:
  group: database-and-vercel-site
  cancel-in-progress: false

jobs:
  refresh-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Check Rome schedule time
        id: schedule_gate
        if: github.event_name == 'schedule'
        shell: bash
        env:
          SCHEDULE_CRON: ${{ github.event.schedule }}
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import os
          from datetime import datetime, timezone
          from zoneinfo import ZoneInfo

          cron = os.environ.get("SCHEDULE_CRON", "")
          parts = cron.split()
          should_run = False
          if len(parts) >= 2:
              minute = int(parts[0])
              hour = int(parts[1])
              now_utc = datetime.now(timezone.utc)
              scheduled_utc = now_utc.replace(hour=hour, minute=minute, second=0, microsecond=0)
              scheduled_rome = scheduled_utc.astimezone(ZoneInfo("Europe/Rome"))
              should_run = (scheduled_rome.hour, scheduled_rome.minute) in {(10, 20), (19, 15), (23, 15)}
          print(f"should_run={'true' if should_run else 'false'}")
          PY

      - name: Set up Python
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Restore previous database artifact
        if: (github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true') && (github.event_name == 'schedule' || inputs.mfl_wallet != 'true')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p previous-database

          {
            gh run list --workflow manual-refresh.yml --status success --limit 30 --json databaseId,createdAt --jq '.[] | [.createdAt, .databaseId] | @tsv'
            gh run list --workflow manual-database-and-site.yml --status success --limit 30 --json databaseId,createdAt --jq '.[] | [.createdAt, .databaseId] | @tsv'
          } | sort -r | while IFS=$'\t' read -r CREATED_AT RUN_ID; do
            if [ -z "$RUN_ID" ]; then
              continue
            fi

            HAS_DATABASE_ARTIFACT="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID}/artifacts" --jq '.artifacts[] | select(.name == "mfl_progression_database" and .expired == false) | .name' | head -n 1)"

            if [ -n "$HAS_DATABASE_ARTIFACT" ]; then
              echo "$RUN_ID" > previous_database_run_id.txt
              break
            fi

            echo "Skipping run $RUN_ID from $CREATED_AT because it has no usable database artifact."
          done

          if [ ! -f previous_database_run_id.txt ]; then
            echo "No previous database artifact found; MFL wallet rows cannot be preserved."
            exit 0
          fi

          DATABASE_RUN_ID="$(cat previous_database_run_id.txt)"
          echo "Restoring database artifact from run $DATABASE_RUN_ID to preserve MFL wallet rows."
          gh run download "$DATABASE_RUN_ID" --name mfl_progression_database --dir previous-database
          cp previous-database/*.db . 2>/dev/null || true

      - name: Run database refresh
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        shell: bash
        run: |
          MFL_WALLET="${{ inputs.mfl_wallet || 'false' }}"
          COMMAND=(python update_database.py --seasons yes --mfl-wallet "$MFL_WALLET")

          if [ -n "${{ inputs.limit }}" ]; then
            COMMAND+=(--limit "${{ inputs.limit }}")
          fi

          if [ -n "${{ inputs.wallet }}" ]; then
            COMMAND+=(--wallet "${{ inputs.wallet }}")
          fi

          "${COMMAND[@]}"

      - name: Export website data
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        run: python export_for_website.py

      - name: Upload database
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mfl_progression_database
          path: mfl_progression.db
          if-no-files-found: error

      - name: Move data behind protected API
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        shell: bash
        run: |
          rm -rf site/api/data-files
          mkdir -p site/api/data-files
          mv site/data/*.json site/api/data-files/
          rmdir site/data
          test -f site/api/data-files/manifest.json
          ls site/api/data-files | head

      - name: Install Vercel CLI
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        run: npm install --global vercel@latest

      - name: Connect Vercel project
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        shell: bash
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > .vercel/project.json

      - name: Deploy protected site to Vercel
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prod --yes --build-env ALLOW_VERCEL_ACTION_DEPLOY=1 --token "$VERCEL_TOKEN"
