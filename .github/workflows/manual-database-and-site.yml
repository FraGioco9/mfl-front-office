name: Manual database and site update

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Number of leaderboard wallets to refresh. Leave empty for all wallets."
        required: false
        default: ""
      wallet:
        description: "Single wallet address to refresh. Leave empty to use leaderboard wallets."
        required: false
        default: ""
      workers:
        description: "Number of workers to use."
        required: false
        default: "100"
      seasons:
        description: "Also populate player_seasons from Flow after the main refresh."
        required: true
        type: choice
        options:
          - "no"
          - "yes"
        default: "no"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run database refresh
        shell: bash
        run: |
          COMMAND=(python update_database.py --workers "${{ inputs.workers }}" --seasons "${{ inputs.seasons }}")

          if [ -n "${{ inputs.limit }}" ]; then
            COMMAND+=(--limit "${{ inputs.limit }}")
          fi

          if [ -n "${{ inputs.wallet }}" ]; then
            COMMAND+=(--wallet "${{ inputs.wallet }}")
          fi

          "${COMMAND[@]}"

      - name: Export website data
        run: python export_for_website.py

      - name: Upload database
        uses: actions/upload-artifact@v4
        with:
          name: mfl_progression_database
          path: mfl_progression.db
          if-no-files-found: error

      - name: Set up GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload website
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Publish website
        uses: actions/deploy-pages@v4
