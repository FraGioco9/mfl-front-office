name: Manual database and site update

on:
  schedule:
    # GitHub cron is UTC. These cover Rome CET and CEST; the guard step keeps only Rome-time matches.
    - cron: "20 8,9 * * *"
    - cron: "15 17,18,21,22 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "Number of leaderboard wallets to refresh. Leave empty for all wallets."
        required: false
        default: ""
      wallet:
        description: "Single wallet address to refresh. Leave empty to use leaderboard wallets."
        required: false
        default: ""
      workers:
        description: "Number of workers to use."
        required: false
        default: "100"
      seasons:
        description: "Also populate player_seasons from Flow after the main refresh."
        required: true
        type: choice
        options:
          - "no"
          - "yes"
        default: "no"

permissions:
  contents: read

concurrency:
  group: database-and-vercel-site
  cancel-in-progress: false

jobs:
  refresh-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Download repository
        uses: actions/checkout@v4

      - name: Check Rome schedule time
        id: schedule_gate
        if: github.event_name == 'schedule'
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          from datetime import datetime
          from zoneinfo import ZoneInfo

          now = datetime.now(ZoneInfo("Europe/Rome"))
          targets = [(10, 20), (19, 15), (23, 15)]
          should_run = any(
              0 <= (now - now.replace(hour=hour, minute=minute, second=0, microsecond=0)).total_seconds() <= 20 * 60
              for hour, minute in targets
          )
          print(f"should_run={'true' if should_run else 'false'}")
          PY

      - name: Set up Python
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run database refresh
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        shell: bash
        run: |
          WORKERS="${{ inputs.workers || '100' }}"
          SEASONS="${{ inputs.seasons || 'no' }}"
          COMMAND=(python update_database.py --workers "$WORKERS" --seasons "$SEASONS")

          if [ -n "${{ inputs.limit }}" ]; then
            COMMAND+=(--limit "${{ inputs.limit }}")
          fi

          if [ -n "${{ inputs.wallet }}" ]; then
            COMMAND+=(--wallet "${{ inputs.wallet }}")
          fi

          "${COMMAND[@]}"

      - name: Export website data
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        run: python export_for_website.py

      - name: Upload database
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: mfl_progression_database
          path: mfl_progression.db
          if-no-files-found: error

      - name: Move data behind protected API
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        shell: bash
        run: |
          rm -rf site/api/data-files
          mkdir -p site/api/data-files
          mv site/data/*.json site/api/data-files/
          rmdir site/data
          test -f site/api/data-files/manifest.json
          ls site/api/data-files | head

      - name: Install Vercel CLI
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        run: npm install --global vercel@latest

      - name: Connect Vercel project
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        shell: bash
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s"}' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > .vercel/project.json

      - name: Deploy protected site to Vercel
        if: github.event_name != 'schedule' || steps.schedule_gate.outputs.should_run == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prod --yes --token "$VERCEL_TOKEN"
