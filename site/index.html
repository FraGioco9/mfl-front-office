<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MFL Progression</title>
    <link rel="stylesheet" href="styles.css?v=30">
  </head>
  <body class="loading">
    <div id="loadingScreen" class="loadingScreen" role="status" aria-live="polite">
      <div class="loadingBox">
        <div id="loadingText" class="loadingText">Preparing data...</div>
        <div class="loadingBar" aria-hidden="true">
          <div id="loadingBarFill" class="loadingBarFill"></div>
        </div>
      </div>
    </div>

    <header class="topbar">
      <div>
        <h1>MFL Progression</h1>
        <p id="statusText">Loading player table...</p>
      </div>
      <div class="headerControls">
        <button id="themeButton" class="themeButton" type="button" aria-label="Switch to night mode" title="Night mode">🌙</button>
        <div class="stats" aria-label="Database stats">
          <div>
            <span id="totalPlayers">-</span>
            <label>players</label>
          </div>
          <div>
            <span id="visiblePlayers">-</span>
            <label>shown</label>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="views" aria-label="Table views">
        <button class="viewButton" type="button" data-view="attributes">Attributes</button>
        <button class="viewButton active" type="button" data-view="current">Current Season</button>
        <button class="viewButton" type="button" data-view="all">All Time</button>
      </section>

      <section class="quickFilters" aria-label="Quick filters">
        <label>
          <input id="hideRetiredInput" type="checkbox" checked>
          <span>Hide retired players</span>
        </label>
        <label>
          <input id="hideRetiringInput" type="checkbox">
          <span>Hide retiring players</span>
        </label>
        <label>
          <input id="newMintsInput" type="checkbox">
          <span>Only new mints</span>
        </label>
      </section>

      <section class="controlsBar" aria-label="Table controls">
        <button id="openFiltersButton" class="compactButton" type="button">🔎 Filters</button>
        <button id="quickClearFiltersButton" class="compactButton" type="button">&#129529; Clear</button>
        <span id="filterSummary">0 active</span>
        <button id="downloadButton" class="compactButton" type="button">💾 Download CSV</button>
        <label class="field compact">
          <span>Rows</span>
          <select id="pageSizeSelect">
            <option value="25">25</option>
            <option value="50">50</option>
            <option value="100" selected>100</option>
            <option value="250">250</option>
          </select>
        </label>
      </section>

      <section class="tableShell" aria-label="Players table">
        <div class="tableScroller">
          <table>
            <colgroup>
              <col class="col-id">
              <col class="col-name">
              <col class="col-nationality">
              <col class="col-age">
              <col class="col-positions">
              <col class="col-seasons">
              <col class="col-stat">
              <col class="col-stat">
              <col class="col-stat">
              <col class="col-stat">
              <col class="col-stat">
              <col class="col-stat">
              <col class="col-stat">
              <col class="col-link">
            </colgroup>
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <div id="emptyState" class="emptyState" hidden>No players match the current filters.</div>
      </section>

      <nav class="pager" aria-label="Pagination">
        <button id="prevButton" type="button">Previous</button>
        <span id="pageText">Page 1</span>
        <button id="nextButton" type="button">Next</button>
      </nav>
    </main>

    <div id="filtersModal" class="modalBackdrop" hidden>
      <section class="filtersDialog" role="dialog" aria-modal="true" aria-labelledby="filtersTitle">
        <header class="filtersHeader">
          <h2 id="filtersTitle">Filters</h2>
          <button id="closeFiltersButton" class="iconButton" type="button" aria-label="Close filters">x</button>
        </header>

        <section class="filterBuilder">
          <div class="addFilterRow">
            <button id="showAddFilterButton" class="iconButton" type="button" aria-label="Add filter">+</button>
            <select id="addFilterSelect" hidden>
              <option value="">Select filter...</option>
            </select>
          </div>

          <div id="filterRules" class="filterRules"></div>
        </section>

        <footer class="filtersFooter">
          <button id="clearFiltersButton" type="button">Clear</button>
          <button id="applyFiltersButton" type="button">Apply Filters</button>
        </footer>
      </section>
    </div>

    <script src="app.js?v=30"></script>
  </body>
</html>
